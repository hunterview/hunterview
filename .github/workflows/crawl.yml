name: 체험단 크롤러

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # KST 9시, 15시, 21시, 3시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install playwright

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 크롤러 실행
        run: python crawler.py

      - name: data.json 변경 확인
        id: check_changes
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "hunterview-bot"
          git config user.email "bot@hunterview.co.kr"
          git add data.json
          COUNT=$(python -c "import json; d=json.load(open('data.json')); print(d.get('total', len(d.get('campaigns',[]))))")
          git commit -m "🤖 데이터 업데이트: ${COUNT}개 캠페인"
          git push
