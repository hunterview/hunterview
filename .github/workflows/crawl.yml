name: 헌터뷰 자동 크롤링

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 라이브러리 설치
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: 크롤러 실행
        run: python crawler.py
      - name: 저장
        run: |
          git config user.name "hunterview-bot"
          git config user.email "bot@hunterview.kr"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 데이터 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase && git push
